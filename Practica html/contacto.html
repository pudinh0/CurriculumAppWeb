<!DOCTYPE html>
<html lang="es">

<head>
    <!--Define la codificacion de caracteres de nuestra pagina web-->
    <meta charset="UTF-8">
    <!-- Permite que el sitio se adaptate a diferentes resoluciones-->
    <meta name="viewport" content="width=device-widht, initial-scale=1.0">
    <!-- Descripcion de nuestra pagina web-->
    <meta name="description" content="Portafolio profesional de Ingenierio en software">
    <meta name="keywords" content="portafolio, ingeniero en software, desarrollo web">
    <!-- Autor-->
    <meta name="author" content="Adel Mendez">

    <!-- titulo de la pagina-->
    <title>Portafolio profesional</title>
    <!-- Se modofica el icon -->
    <link rel="icon" type="image/jpeg" href="https://i.pinimg.com/736x/19/60/56/1960568a77e393609d90b69f68ef6b70.jpg">
    <link rel="stylesheet" href="estilos/style.css">
</head>

<body>
    <div class="container">



        <header class="header">
            <button class="menu-toggle" id="menu-toggle">
                <span class="bar"></span>
                <span class="bar"> </span>
                <span class="bar"></span>
            </button>


            <h1>Contact me!</h1>
            <nav class="navegador" id="navegador">
                <a href="index.html">Home</a>
                <a href="about.html">About me</a>
                <a href="skills.html">Skills</a>
                <a href="projects.html">Projects</a>
                <a>Contact</a>
            </nav>
        </header>

        <main class="main">
            <div class="carta">
                <section>
                    <h2>Contactame :D</h2>
                    
                </section>

                <form class="form-contacto" action="images/" method="post">
                    <div class="campo">
                        <label for="nombre">Nombre Completo:</label>
                        <input type="text" id="nombre" name="nombre" placeholder="Ej. Adel Mendez" required>
                    </div>

                    <div class="campo">
                        <label for="email">Correo Electrónico:</label>
                        <input type="email" id="email" name="email" placeholder="Ej.adel@gmail.com" required>
                    </div>

                    <div class="campo">
                        <label for="telefono">Teléfono:</label>
                        <input type="text" id="telefono" name="telefono" placeholder="6121234567" required>
                    </div>

                    <div class="campo">
                        <label for="fecha">Fecha de contacto:</label>
                        <input type="date" id="fecha" name="fecha">
                    </div>

                    <div class="campo full-width">
                        <label for="mensaje">Mensaje:</label>
                        <textarea id="mensaje" name="mensaje" rows="4" placeholder="Escribe tu mensaje aquí..."
                            required></textarea>
                    </div>



                    <div class="campo full-width">
                        <label>¿Cómo te gustaría que te contacte?</label>
                        <div class="radio-group">

                            <label class="radio-item">
                                <input type="radio" name="preferencia" value="email" required>
                                <span class="custom-radio"></span>
                                Email
                            </label>
                            <label class="radio-item">
                                <input type="radio" name="preferencia" value="telefono" required>
                                <span class="custom-radio"></span>
                                Teléfono
                            </label>
                        </div>
                    </div>

                    <div class="campo full-width botones-container">
                        <button class="btn-primario" type="submit">Enviar Mensaje</button>
                        <button class="btn-secundario" type="reset">Limpiar Formulario</button>
                    </div>
                </form>
                </section>
            </div>

        </main>
    </div>
    <footer class="footer">
        <p>&copy; 2026 Adel Mendez. Todos los derechos reservados.</p>
    </footer>
    <script src="estilos/script.js"></script>
</body>

</html>
